<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPBU Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F7F4;--surface:#FFFFFF;--surface2:#F1EFE9;--border:#E4E0D8;--border2:#D0CCBF;
  --text:#1A1916;--text2:#6B6760;--text3:#A09C95;
  --green:#2D6A2D;--green-bg:#EAF3DE;--green-light:#9FCF9F;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-light:#F7C1C1;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-light:#85B7EB;
  --amber:#854F0B;--amber-bg:#FAEEDA;--amber-light:#FAC775;
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-light:#AFA9EC;
  --radius:8px;--radius-lg:12px;--shadow:0 1px 3px rgba(0,0,0,.08);
  --font:'IBM Plex Sans',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* TOPBAR */
.topbar{background:var(--text);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.topbar-brand{font-size:16px;font-weight:600;letter-spacing:.5px;display:flex;align-items:center;gap:10px}
.topbar-brand span{background:#F5C518;color:var(--text);padding:2px 7px;border-radius:4px;font-size:12px;font-weight:700;letter-spacing:.5px}
.topbar-info{font-size:12px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:16px}
.db-badge{background:rgba(255,255,255,.12);border:.5px solid rgba(255,255,255,.2);padding:3px 9px;border-radius:20px;font-size:11px;display:flex;align-items:center;gap:5px}
.db-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.main{flex:1;padding:24px;overflow-x:hidden}

/* SIDEBAR NAV */
.nav-section{padding:4px 12px 8px;font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .15s;text-decoration:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue);border-left-color:var(--blue);font-weight:500}
.nav-item .nav-icon{font-size:15px;width:18px;text-align:center}
.nav-divider{height:1px;background:var(--border);margin:8px 12px}

/* PAGE HEADER */
.page-header{margin-bottom:20px}
.page-title{font-size:20px;font-weight:600;color:var(--text);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text2)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}

/* GRID */
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.metric{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:default}
.metric:hover{border-color:var(--border2)}
.metric-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.metric-value{font-size:20px;font-weight:700;color:var(--text)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px}
.metric-value.c-green{color:var(--green)}
.metric-value.c-red{color:var(--red)}
.metric-value.c-blue{color:var(--blue)}
.metric-value.c-purple{color:var(--purple)}
.metric-value.c-amber{color:var(--amber)}

/* SHIFT HEADER */
.shift-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow)}
.shift-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;flex-wrap:wrap;gap:8px}
.shift-hdr.sh-p{background:var(--green-bg);border-bottom:1px solid var(--green-light)}
.shift-hdr.sh-s{background:var(--amber-bg);border-bottom:1px solid var(--amber-light)}
.shift-hdr.sh-m{background:var(--purple-bg);border-bottom:1px solid var(--purple-light)}
.shift-name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.shift-dot{width:8px;height:8px;border-radius:50%}
.dp{background:var(--green)}.ds{background:var(--amber)}.dm{background:var(--purple)}
.shift-time{font-size:11px;color:var(--text2);margin-left:4px}
.shift-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.shift-content{padding:16px 20px}

/* STATE BADGE */
.state-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.sb-edit{background:var(--amber-bg);color:var(--amber);border:.5px solid var(--amber-light)}
.sb-saved{background:var(--green-bg);color:var(--green);border:.5px solid var(--green-light)}

/* BUTTONS */
.btn{padding:7px 14px;font-size:12px;border-radius:var(--radius);cursor:pointer;font-weight:500;border:1px solid transparent;font-family:var(--font);transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{opacity:.87}
.btn-save{background:var(--green);color:#fff;border-color:var(--green)}
.btn-save:hover{opacity:.87}
.btn-edit{background:var(--surface);color:var(--text2);border-color:var(--border)}
.btn-edit:hover{background:var(--surface2);color:var(--text)}
.btn-reset{background:var(--surface);color:var(--red);border-color:var(--red-light)}
.btn-reset:hover{background:var(--red-bg)}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn-danger:hover{opacity:.87}
.btn-ghost{background:none;color:var(--text2);border-color:var(--border)}
.btn-ghost:hover{background:var(--surface2)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-lg{padding:10px 20px;font-size:14px}
.btn-del{width:28px;height:28px;padding:0;justify-content:center;background:none;color:var(--text3);border-color:var(--border)}
.btn-del:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-light)}

/* FORMS */
.form-row{display:grid;gap:12px;margin-bottom:12px}
.form-row.cols-2{grid-template-columns:1fr 1fr}
.form-row.cols-3{grid-template-columns:1fr 1fr 1fr}
.form-row.cols-4{grid-template-columns:repeat(4,1fr)}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.inp{padding:8px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:var(--font);width:100%;transition:border .15s}
.inp:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.inp[readonly]{background:var(--surface2);color:var(--text3);cursor:not-allowed;border-color:transparent}
.inp-num{text-align:right}
.inp-auto{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-light)}
.inp-tambah{background:var(--green-bg);color:var(--green);border-color:var(--green-light)}
select.inp{cursor:pointer}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;text-align:right;border-bottom:2px solid var(--border);background:var(--surface2);white-space:nowrap}
thead th:first-child{text-align:left}
tbody td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--border);vertical-align:middle}
tbody td:first-child{text-align:left}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child td{border-bottom:none}
tfoot td{font-weight:700;padding:8px 10px;text-align:right;border-top:2px solid var(--border);background:var(--surface2)}
tfoot td:first-child{text-align:left}

/* ROW STATES */
tr.row-losses td{background:rgba(252,235,235,.4)!important}
tr.row-losses td:first-child{border-left:3px solid var(--red)}
tr.row-plus td{background:rgba(238,237,254,.4)!important}
tr.row-plus td:first-child{border-left:3px solid var(--purple)}
tr.row-saved{opacity:.8}

/* TAGS & BADGES */
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tp{background:var(--green-bg);color:var(--green)}
.tx{background:var(--blue-bg);color:var(--blue)}
.td{background:var(--amber-bg);color:var(--amber)}
.tb{background:var(--purple-bg);color:var(--purple)}
.bx{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bk{background:var(--green-bg);color:var(--green)}
.bl{background:var(--red-bg);color:var(--red)}
.bp{background:var(--purple-bg);color:var(--purple)}
.bw{background:var(--amber-bg);color:var(--amber)}
.bn{background:var(--blue-bg);color:var(--blue)}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}

/* PILL */
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:12px;font-weight:600;min-width:80px;justify-content:flex-end}
.pill-ok{background:var(--surface2);color:var(--text)}
.pill-rendah{background:var(--amber-bg);color:var(--amber)}
.pill-zero-l{background:var(--red-bg);color:var(--red)}
.pill-zero-p{background:var(--purple-bg);color:var(--purple)}
.pill-new{background:var(--green-bg);color:var(--green);border:.5px solid var(--green-light)}

/* LOSSES/PLUS AUTO */
.losses-val{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;color:var(--red);background:var(--red-bg);white-space:nowrap}
.plus-val{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600;color:var(--purple);background:var(--purple-bg);white-space:nowrap}

/* NOTICES */
.nt{display:flex;gap:8px;padding:10px 12px;border-radius:var(--radius);font-size:12px;margin-bottom:6px;line-height:1.5;align-items:flex-start;border-left:3px solid}
.nt-d{background:var(--red-bg);color:var(--red);border-left-color:var(--red)}
.nt-p{background:var(--purple-bg);color:var(--purple);border-left-color:var(--purple)}
.nt-w{background:var(--amber-bg);color:var(--amber);border-left-color:var(--amber)}
.nt-i{background:var(--blue-bg);color:var(--blue);border-left-color:var(--blue)}
.nt-s{background:var(--green-bg);color:var(--green);border-left-color:var(--green)}

/* FORMULA BOX */
.formula-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;font-size:12px;display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.feq{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-family:'IBM Plex Mono',monospace;font-size:11px}

/* PENAMBAHAN MID-SHIFT */
.tambah-sec{margin-top:14px;padding:14px;background:var(--surface2);border-radius:var(--radius);border:1px dashed var(--border2)}
.tambah-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.mid-badge{background:var(--blue-bg);color:var(--blue);padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.cur-stk{font-size:11px;font-weight:600;color:var(--green);margin-top:4px;text-align:right}

/* SEPARATOR */
.sep{height:1px;background:var(--border);margin:14px 0}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px}
.rrow.tot{font-weight:700;font-size:14px;border-top:2px solid var(--border);padding-top:10px;margin-top:4px}
.rl{color:var(--text2)}
.rv{color:var(--text);font-weight:500}

/* BIAYA TABLE */
.biaya-add{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px;padding:14px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)}
.fg-ket{flex:2;min-width:140px}
.fg-cat{flex:0 0 120px}
.fg-nom{flex:0 0 130px}

/* DB PANEL */
.db-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px}
.db-stat{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.db-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;flex:1;min-width:120px}
.db-item-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.db-item-val{font-size:16px;font-weight:700;color:var(--text)}

/* SNAV */
.snav{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.snavbtn{padding:5px 12px;font-size:12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:none;color:var(--text2);font-family:var(--font);font-weight:500;transition:all .15s}
.snavbtn:hover{background:var(--surface2)}
.snavbtn.active{background:var(--text);color:#fff;border-color:var(--text)}

/* HIST */
.hist-row{display:grid;grid-template-columns:100px 60px 1fr 90px 55px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.hist-row:last-child{border-bottom:none}
.hist-head{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}

/* HARGA TABLE */
.harga-inp{width:100%;padding:6px 9px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);text-align:right;font-family:var(--font)}
.harga-inp:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1)}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:16px}
  .form-row.cols-4{grid-template-columns:1fr 1fr}
  .g4{grid-template-columns:1fr 1fr}
}

/* CHART */
.chart-wrap{position:relative;width:100%;height:220px}

/* FLOW */
.flow-arrow{text-align:center;font-size:11px;color:var(--text3);padding:6px 0;display:flex;align-items:center;justify-content:center;gap:6px}

/* PREVIEW */
.preview-section{background:var(--surface);border:2px solid var(--green-light);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px}
.preview-title{font-size:15px;font-weight:700;color:var(--green);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:11px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.toast.show{opacity:1}

/* EMPTY */
.empty-state{text-align:center;padding:32px;color:var(--text3);font-size:13px}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:12px;color:var(--text2)}
.ldot{width:10px;height:10px;border-radius:3px;display:inline-block}

/* CONFIRM MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:24px;max-width:360px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:8px}
.modal-body{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>

</div>

<!-- LAYOUT -->
<div class="layout">
  <!-- SIDEBAR -->
  <nav class="sidebar">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
// ─── CONSTANTS ──────────────────────────────────────────────
const BBM=['pertalite','pertamax','dexlite','biosolar'];
const BL={pertalite:'Pertalite',pertamax:'Pertamax',dexlite:'Dexlite',biosolar:'Biosolar'};
const BT={pertalite:'tp',pertamax:'tx',dexlite:'td',biosolar:'tb'};
const BATAS={pertalite:3000,pertamax:2000,dexlite:1500,biosolar:3000};
const HARI=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const SO=['pagi','siang','malam'];
const SI={pagi:{label:'Shift Pagi',hdr:'sh-p',dot:'dp',time:'06.00–14.00'},siang:{label:'Shift Siang',hdr:'sh-s',dot:'ds',time:'14.00–22.00'},malam:{label:'Shift Malam',hdr:'sh-m',dot:'dm',time:'22.00–06.00'}};
const DEF={pagi:{pertalite:{awal:0,jual:0,tambah:0},pertamax:{awal:0,jual:0,tambah:0},dexlite:{awal:0,jual:0,tambah:0},biosolar:{awal:0,jual:0,tambah:0}},siang:{pertalite:{jual:0,tambah:0},pertamax:{jual:0,tambah:0},dexlite:{jual:0,tambah:0},biosolar:{jual:0,tambah:0}},malam:{pertalite:{jual:0,tambah:0},pertamax:{jual:0,tambah:0},dexlite:{jual:0,tambah:0},biosolar:{jual:0,tambah:0}}};
const CATS={gaji:{label:'Gaji/Upah',bg:'#EAF3DE',color:'#2D6A2D'},listrik:{label:'Listrik & Air',bg:'#E6F1FB',color:'#185FA5'},perawatan:{label:'Perawatan',bg:'#FAEEDA',color:'#854F0B'},administrasi:{label:'Administrasi',bg:'#EEEDFE',color:'#534AB7'},lainnya:{label:'Lain-lain',bg:'#F1EFE8',color:'#5F5E5A'}};
const DB_KEY='spbu_manager_v1';

// ─── STATE ──────────────────────────────────────────────────
let state={sel:{pagi:true,siang:false,malam:false},shiftSaved:{pagi:false,siang:false,malam:false},biayaItems:[],biayaId:1,savedData:[],harga:{pertalite:10000,hpp_pertalite:9998,pertamax:13200,hpp_pertamax:13235,dexlite:14550,hpp_dexlite:15099,biosolar:6800,hpp_biosolar:6799},riwayatHarga:[]};
let currentPage='input';
let histChartInst=null;

// ─── LOCALSTORAGE ────────────────────────────────────────────
function dbSave(){try{localStorage.setItem(DB_KEY,JSON.stringify(state));}catch(err){toast('⚠ Gagal menyimpan ke database: '+err.message);}}
function dbLoad(){try{const d=localStorage.getItem(DB_KEY);if(d){const p=JSON.parse(d);state={...state,...p};}}catch(e){toast('⚠ Gagal memuat database');}}

// ─── HELPERS ────────────────────────────────────────────────
const e=id=>document.getElementById(id);
const gv=id=>{const el=e(id);if(!el)return 0;return parseFloat((el.value||'').replace(/\./g,'').replace(',','.'))||0};
const gck=id=>{const el=e(id);return el?el.checked:false};
const st=(id,v,cls)=>{const el=e(id);if(el){el.textContent=v;if(cls!==undefined)el.className=cls}};
const fN=v=>Math.round(v).toLocaleString('id');
const fR=v=>{const s=v<0?'-':'';const a=Math.abs(Math.round(v));if(a>=1e9)return s+'Rp '+(a/1e9).toFixed(2)+' M';if(a>=1e6)return s+'Rp '+(a/1e6).toFixed(1)+' jt';return s+'Rp '+a.toLocaleString('id')};
const fRF=v=>{const s=v<0?'-':'';return s+'Rp '+Math.abs(Math.round(v)).toLocaleString('id')};
const gHJ=b=>state.harga[b]||0;
const gHPP=b=>state.harga['hpp_'+b]||0;

// Ambil harga yang berlaku pada tanggal tertentu dari riwayat
function getHargaPadaTanggal(tanggal,b){
  if(!state.riwayatHarga||!state.riwayatHarga.length) return {hj:gHJ(b),hpp:gHPP(b)};
  // Cari riwayat yang berlaku pada tanggal tsb (tanggalBerlaku <= tanggal)
  const sorted=[...state.riwayatHarga].sort((a,z)=>a.tanggal>z.tanggal?-1:1);
  const match=sorted.find(r=>r.tanggal<=tanggal);
  if(!match) return {hj:gHJ(b),hpp:gHPP(b)};
  return {hj:match.harga[b]||gHJ(b),hpp:match.harga['hpp_'+b]||gHPP(b)};
}

// Simpan harga saat ini ke riwayat dengan tanggal berlaku
function simpanRiwayatHarga(tanggalBerlaku,keterangan=''){
  if(!state.riwayatHarga) state.riwayatHarga=[];
  const snapshot={...state.harga};
  // Cek apakah sudah ada riwayat untuk tanggal ini
  const idx=state.riwayatHarga.findIndex(r=>r.tanggal===tanggalBerlaku);
  const rec={tanggal:tanggalBerlaku,harga:snapshot,keterangan,savedAt:new Date().toISOString()};
  if(idx>=0) state.riwayatHarga[idx]=rec;
  else state.riwayatHarga.unshift(rec);
  state.riwayatHarga.sort((a,z)=>a.tanggal>z.tanggal?-1:1);
  dbSave();
}
const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function toast(msg,dur=2500){const t=e('toast');if(!t)return;t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

// ─── LOGIKA STOK ────────────────────────────────────────────
// LOSSES = Awal − Jual  (habis dicentang)
// PLUS   = Jual − Awal  (jual > awal otomatis)
// Penambahan mid-shift langsung masuk stok berjalan shift tersebut
function calcRow(awal,jual,tambah,habis){
  const selisih=awal-jual;
  if(habis){const losses=Math.max(0,selisih);return{catatan:0,losses,plus:0,jualEfektif:jual,stokBaru:tambah,stokAkhirEfektif:tambah,isLocked:true,lockType:'losses'};}
  if(selisih<0){const plus=Math.abs(selisih);return{catatan:0,losses:0,plus,jualEfektif:jual,stokBaru:tambah,stokAkhirEfektif:tambah,isLocked:true,lockType:'plus'};}
  const catatan=selisih+tambah;
  return{catatan,losses:0,plus:0,jualEfektif:jual,stokBaru:0,stokAkhirEfektif:catatan,isLocked:false,lockType:'normal'};
}

// ─── PAGE ROUTER ─────────────────────────────────────────────
function showPage(name){
  currentPage=name;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navMap={input:0,stok:1,laba:2,selisih:3,histori:5,harga:6,database:8};
  const allNav=document.querySelectorAll('.nav-item');
  if(allNav[navMap[name]])allNav[navMap[name]].classList.add('active');
  const main=e('main-content');
  if(!main)return;
  if(name==='input')renderInputPage(main);
  else if(name==='stok')renderStokPage(main);
  else if(name==='laba')renderLabaPage(main);
  else if(name==='selisih')renderSelisihPage(main);
  else if(name==='histori')renderHistoriPage(main);
  else if(name==='harga')renderHargaPage(main);
  else if(name==='database')renderDBPage(main);
}

function tgSh(sh){
  if(state.shiftSaved[sh]){toast('Shift '+cap(sh)+' sudah disimpan. Klik Edit untuk mengubah.');return;}
  state.sel[sh]=!state.sel[sh];
  const card=e('sc-'+sh);
  if(card)renderInputPage(e('main-content'));
  else renderShifts();
}

function saveShift(sh){state.shiftSaved[sh]=true;dbSave();toast('Shift '+cap(sh)+' tersimpan dan dikunci ✓');renderShifts();}
function editShift(sh){state.shiftSaved[sh]=false;dbSave();toast('Shift '+cap(sh)+' dibuka untuk diedit.');renderShifts();}

function confirmResetShift(sh){
  if(confirm('Reset data shift '+cap(sh)+'? Semua nilai akan menjadi 0.')){
    state.shiftSaved[sh]=false;
    BBM.forEach(b=>{
      const aEl=e(`${sh}-awal-${b}`);if(aEl&&!aEl.readOnly)aEl.value=0;
      const jEl=e(`${sh}-jual-${b}`);if(jEl)jEl.value=0;
      const tEl=e(`${sh}-tambah-${b}`);if(tEl)tEl.value=0;
      const hEl=e(`${sh}-habis-${b}`);if(hEl)hEl.checked=false;
    });
    renderShifts();calcAll();toast('Shift '+cap(sh)+' direset ke 0.');
  }
}

function confirmResetAll(){
  if(confirm('Reset semua data? Semua shift akan kembali ke 0.')){
    SO.forEach(sh=>{state.shiftSaved[sh]=false;});
    state.sel={pagi:true,siang:false,malam:false};
    state.biayaItems=[];
    state.biayaId=1;
    state.biayaId=1;
    dbSave();
    showPage('input');
    toast('Semua data direset.');
  }
}

// ─── COMPUTE ────────────────────────────────────────────────
function calcShift(sh){
  const notices=[];
  BBM.forEach(b=>{
    const awal=gv(`${sh}-awal-${b}`);
    const habis=gck(`${sh}-habis-${b}`);
    const jual=gv(`${sh}-jual-${b}`);
    const tambah=gv(`${sh}-tambah-${b}`);
    const r=calcRow(awal,jual,tambah,habis);
    const jEl=e(`${sh}-jual-${b}`);
    if(jEl&&!state.shiftSaved[sh]){if(habis){jEl.value=0;jEl.readOnly=true;jEl.className='inp inp-num';jEl.style.background='var(--surface2)';jEl.style.color='var(--text3)';}else{jEl.readOnly=false;jEl.style.background='';jEl.style.color='';}}
    const cc=e(`${sh}-catatan-cell-${b}`);
    if(cc){if(r.isLocked){const cls=r.lockType==='losses'?'pill pill-zero-l':'pill pill-zero-p';cc.innerHTML=`<span class="${cls}">0 🔒</span>`;}else if(r.catatan<=BATAS[b]&&r.catatan>0){cc.innerHTML=`<span class="pill pill-rendah">${fN(r.catatan)}</span>`;}else{cc.innerHTML=`<span class="pill pill-ok">${fN(r.catatan)}</span>`;}}
    const sc2=e(`${sh}-sel-cell-${b}`);
    if(sc2){if(r.isLocked&&r.lockType==='losses'){sc2.innerHTML=`<span class="losses-val">▲ ${fN(r.losses)} ltr 🔒<br><small>${fN(awal)}−${fN(jual)}=${fN(r.losses)}</small></span>`;}else if(r.isLocked&&r.lockType==='plus'){sc2.innerHTML=`<span class="plus-val">↑ +${fN(r.plus)} ltr 🔒<br><small>${fN(jual)}−${fN(awal)}=${fN(r.plus)}</small></span>`;}else{sc2.innerHTML='<span style="color:var(--text3);font-size:12px">— Normal</span>';}}
    const ns=e(`${sh}-stk-cur-${b}`);
    if(ns){if(tambah>0){ns.textContent=`Stok berjalan: ${fN(r.stokAkhirEfektif)} ltr`;}else{ns.textContent='';}}
    const tr=e(`tr-${sh}-${b}`);
    if(tr)tr.className=r.isLocked&&r.lockType==='losses'?'row-losses':r.isLocked&&r.lockType==='plus'?'row-plus':state.shiftSaved[sh]?'row-saved':'';
    const st2=e(`${sh}-status-${b}`);
    if(st2){if(r.isLocked&&r.lockType==='losses'){let s=`<span class="bx bl">Losses 🔒</span>`;if(tambah>0)s+=` <span class="bx bn">+${fN(tambah)} baru</span>`;st2.innerHTML=s;}else if(r.isLocked&&r.lockType==='plus'){let s=`<span class="bx bp">Plus 🔒</span>`;if(tambah>0)s+=` <span class="bx bn">+${fN(tambah)} baru</span>`;st2.innerHTML=s;}else if(r.catatan<=BATAS[b]&&r.catatan>0){st2.innerHTML='<span class="bx bw">Rendah</span>';}else{st2.innerHTML='<span class="bx bk">OK</span>';}}
    if(r.isLocked&&r.lockType==='losses'){let msg=`▲ <strong>${BL[b]}</strong>: Losses = ${fN(awal)}−${fN(jual)} = <strong>${fN(r.losses)} ltr</strong> 🔒 — kerugian ${fRF(r.losses*gHJ(b))}.`;if(tambah>0)msg+=` Penambahan ${fN(tambah)} ltr = stok baru.`;notices.push(`<div class="nt nt-d">${msg}</div>`);}
    if(r.isLocked&&r.lockType==='plus'){let msg=`↑ <strong>${BL[b]}</strong>: Plus = ${fN(jual)}−${fN(awal)} = <strong>${fN(r.plus)} ltr</strong> 🔒 — keuntungan +${fRF(r.plus*gHJ(b))}.`;if(tambah>0)msg+=` Penambahan ${fN(tambah)} ltr = stok baru.`;notices.push(`<div class="nt nt-p">${msg}</div>`);}
    if(!r.isLocked&&r.catatan>0&&r.catatan<=BATAS[b])notices.push(`<div class="nt nt-w">⚠ <strong>${BL[b]}</strong>: Stok menipis sisa ${fN(r.catatan)} ltr.</div>`);
    if(tambah>0&&!r.isLocked)notices.push(`<div class="nt nt-s">+ <strong>${BL[b]}</strong>: Penambahan ${fN(tambah)} ltr berjalan — stok akhir ${fN(r.stokAkhirEfektif)} ltr.</div>`);
  });
  const nb=e(`notice-${sh}`);if(nb)nb.innerHTML=notices.join('');
}

function propagate(fromSh,toSh){
  BBM.forEach(b=>{
    const awal=gv(`${fromSh}-awal-${b}`);const habis=gck(`${fromSh}-habis-${b}`);
    const jual=gv(`${fromSh}-jual-${b}`);const tambah=gv(`${fromSh}-tambah-${b}`);
    const r=calcRow(awal,jual,tambah,habis);
    const toEl=e(`${toSh}-awal-${b}`);
    if(toEl&&toEl.readOnly&&!state.shiftSaved[toSh])toEl.value=Math.max(0,r.stokAkhirEfektif);
  });calcShift(toSh);
}

function calcAll(){
  const active=SO.filter(s=>state.sel[s]);
  active.forEach((sh,idx)=>{calcShift(sh);if(idx<active.length-1)propagate(sh,active[idx+1]);});
  updatePreviewIfOpen();
}

function onFC(sh,b){
  calcShift(sh);
  const active=SO.filter(s=>state.sel[s]);const idx=active.indexOf(sh);
  for(let i=idx+1;i<active.length;i++)propagate(active[i-1],active[i]);
  updatePreviewIfOpen();
}
function onHabis(sh,b){onFC(sh,b);}
function onTambahChange(sh,b){

// ─── AKUMULASI ───────────────────────────────────────────────
function getAkum(){
  const active=SO.filter(s=>state.sel[s]);const out={};
  BBM.forEach(b=>{
    const awal=gv(`${active[0]}-awal-${b}`)||0;
    let tJual=0,tTambah=0,tLosses=0,tPlus=0,stokAkhir=0;
    active.forEach(sh=>{
      const a=gv(`${sh}-awal-${b}`)||0;const habis=gck(`${sh}-habis-${b}`);
      const jual=gv(`${sh}-jual-${b}`)||0;const tambah=gv(`${sh}-tambah-${b}`)||0;
      const r=calcRow(a,jual,tambah,habis);
      tJual+=r.jualEfektif;tTambah+=tambah;tLosses+=r.losses;tPlus+=r.plus;stokAkhir=r.stokAkhirEfektif;
    });
    out[b]={awal,tJual,tTambah,tLosses,tPlus,stokAkhir};
  });
  return{active,out};
}

// ─── BIAYA ──────────────────────────────────────────────────
function fmtB(el){const raw=el.value.replace(/\./g,'').replace(/\D/g,'');if(!raw){el.value='';return;}el.value=parseInt(raw).toLocaleString('id');}
function getTotalBiaya(){return state.biayaItems.reduce((s,i)=>s+i.nom,0);}
function addBiaya(){
  const ket=e('b-ket').value.trim();const cat=e('b-cat').value;const nom=parseInt((e('b-nom').value||'').replace(/\./g,''))||0;
  if(!ket){toast('Keterangan tidak boleh kosong!');return;}if(nom<=0){toast('Nominal harus lebih dari 0!');return;}
  state.biayaItems.push({id:state.biayaId++,ket,cat,nom});
  e('b-ket').value='';e('b-nom').value='';e('b-cat').value='gaji';
  renderBiaya();dbSave();
}
function delBiaya(id){state.biayaItems=state.biayaItems.filter(i=>i.id!==id);renderBiaya();dbSave();}
function renderBiaya(){
  const tbody=e('biaya-tbody');if(!tbody)return;
  if(!state.biayaItems.length){tbody.innerHTML='<tr><td colspan="5" class="empty-state">Belum ada item. Tambahkan di atas.</td></tr>';st('biaya-total','Rp 0');const cr=e('biaya-cat-rows');if(cr)cr.innerHTML='';return;}

  st('biaya-total','Rp '+fN(getTotalBiaya()));
  const catTotals={};state.biayaItems.forEach(i=>catTotals[i.cat]=(catTotals[i.cat]||0)+i.nom);
  const cr=e('biaya-cat-rows');if(cr)cr.innerHTML=Object.entries(catTotals).map(([cat,sum])=>{const c=CATS[cat]||CATS.lainnya;return`<div class="rrow"><span class="rl"><span class="cat-badge" style="background:${c.bg};color:${c.color}">${c.label}</span></span><span class="rv">Rp ${fN(sum)}</span></div>`;}).join('');

// ─── SAVE ───────────────────────────────────────────────────
function saveData(){
  const tanggal=e('f-tanggal')?.value||'';
  if(!tanggal){toast('Tanggal harus diisi!');return;}
  const active=SO.filter(s=>state.sel[s]);if(!active.length){toast('Pilih minimal 1 shift!');return;}
  const shiftData={};
  active.forEach(sh=>{shiftData[sh]={};BBM.forEach(b=>{
    const awal=gv(`${sh}-awal-${b}`)||0;const habis=gck(`${sh}-habis-${b}`);
    const jual=gv(`${sh}-jual-${b}`)||0;const tambah=gv(`${sh}-tambah-${b}`)||0;
    const r=calcRow(awal,jual,tambah,habis);
    shiftData[sh][b]={awal,jual:r.jualEfektif,tambah,habis,catatan:r.catatan,losses:r.losses,plus:r.plus,stokBaru:r.stokBaru,stokAkhirEfektif:r.stokAkhirEfektif,isLocked:r.isLocked,lockType:r.lockType};
  });});
  const{out}=getAkum();
  let tJual=0,tOmzet=0,tMargin=0,tLRp=0,tPRp=0;
  const hargaAktif=getHargaPadaTanggal(tanggal,'_snap_')||{};
  BBM.forEach(b=>{const d=out[b];const vol=d.tJual+d.tPlus;const {hj,hpp}=getHargaPadaTanggal(tanggal,b);tJual+=vol;tOmzet+=vol*hj;tMargin+=vol*(hj-hpp);tLRp+=d.tLosses*hj;tPRp+=d.tPlus*hj;});
  const ops=getTotalBiaya();
  const hargaSnapshot={...state.harga};
  const rec={tanggal,hari:e('f-hari')?.value||'',shifts:active,shiftData,biayaItems:[...state.biayaItems],ops,totalJual:tJual,totalOmzet:tOmzet,totalMargin:tMargin,tLRp,tPRp,labaBersih:tMargin-ops-tLRp+tPRp,hargaSnapshot,savedAt:new Date().toISOString()};
  const idx=state.savedData.findIndex(d=>d.tanggal===tanggal);
  if(idx>=0)state.savedData[idx]=rec;else state.savedData.unshift(rec);
  state.savedData=state.savedData.slice(0,365);
  dbSave();
  toast('✓ Data '+tanggal+' tersimpan!');
  previewOpen=false;
  showPage('stok');
  // Auto cloud sync jika URL sudah diatur
  if(getCloudUrl()){
    cloudSave(rec).then(r=>{
      if(r.ok)toast('☁ Tersinkron ke cloud: '+tanggal);
      else toast('⚠ Simpan lokal OK, cloud gagal: '+r.msg);
    });
  }
}

function loadData(i){
  const d=state.savedData[i];if(!d)return;

    if(e('f-tanggal'))e('f-tanggal').value=d.tanggal;onTgl();

}

// ─── CLOUD SYNC ──────────────────────────────────────────────
const CLOUD_KEY='spbu_cloud_url';
function getCloudUrl(){return localStorage.getItem(CLOUD_KEY)||'';}
function setCloudUrl(url){localStorage.setItem(CLOUD_KEY,url);}

// Status indikator di topbar
function setCloudStatus(status,msg){
  const dot=document.querySelector('.db-dot');
  const badge=document.querySelector('.db-badge');
  if(!dot||!badge)return;
  const map={
    active:  {bg:'#4CAF50',text:'● Cloud Aktif'},
    syncing: {bg:'#F5C518',text:'↻ Menyinkron...'},
    error:   {bg:'#e53935',text:'✕ Gagal Sync'},
    local:   {bg:'#4CAF50',text:'● LocalStorage'},
    loading: {bg:'#F5C518',text:'↻ Memuat...'},
  };
  const s=map[status]||map.local;
  dot.style.background=s.bg;
  badge.querySelector('span+*')&&(badge.lastChild.textContent=' '+(msg||s.text));
  if(!badge.dataset.orig)badge.dataset.orig=badge.textContent;
  badge.innerHTML=`<span class="db-dot" style="background:${s.bg}"></span> ${msg||s.text}`;
}

// Kirim data satu hari ke cloud
async function cloudSave(recData){
  const url=getCloudUrl();
  if(!url)return {ok:false,msg:'URL belum diatur'};
  setCloudStatus('syncing');
  try{
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'save',data:recData})});
    const json=await res.json();
    if(json.status==='ok'){setCloudStatus('active','● Tersimpan '+recData.tanggal);return {ok:true};}
    setCloudStatus('error','✕ '+json.msg);return {ok:false,msg:json.msg};
  }catch(err){setCloudStatus('error','✕ Tidak terhubung');return {ok:false,msg:err.message};}
}

// Muat semua data dari cloud
async function cloudLoad(){
  const url=getCloudUrl();
  if(!url)return {ok:false,msg:'URL belum diatur'};
  setCloudStatus('loading','↻ Memuat dari cloud...');
  try{
    const res=await fetch(url+'?action=load');
    const json=await res.json();
    if(json.status==='ok'){
      state.savedData=json.data||[];
      dbSave();
      setCloudStatus('active','● Cloud Aktif');
      return {ok:true,count:json.data.length};
    }
    setCloudStatus('error','✕ '+json.msg);return {ok:false,msg:json.msg};
  }catch(err){setCloudStatus('error','✕ Tidak terhubung');return {ok:false,msg:err.message};}
}

// Kirim semua data lokal ke cloud (full sync)
async function cloudSyncAll(){
  const url=getCloudUrl();
  if(!url){toast('⚠ URL Apps Script belum diatur!');return;}
  if(!state.savedData.length){toast('Tidak ada data untuk disinkronkan.');return;}
  setCloudStatus('syncing');
  let ok=0,fail=0;
  for(const rec of state.savedData){
    const r=await cloudSave(rec);
    if(r.ok)ok++;else fail++;
  }
  if(fail===0){toast('✓ Semua '+ok+' data berhasil disinkronkan ke cloud!');setCloudStatus('active','● '+ok+' data tersinkron');}
  else{toast('⚠ '+ok+' berhasil, '+fail+' gagal.');setCloudStatus('error','✕ '+fail+' gagal');}
  renderDBPage(e('main-content'));
}

    <div class="nt nt-s" style="margin-bottom:14px">✓ Aplikasi terhubung ke Google Sheets. Setiap simpan data akan otomatis tersinkron ke cloud.</div>

      ⚠ Tanpa cloud sync, data hanya tersimpan di browser perangkat ini. Manager dan owner tidak bisa berbagi data secara real-time.
    </div>
    <div style="background:var(--surface2);border-radius:var(--radius);padding:14px;margin-bottom:14px;font-size:13px;line-height:1.8">
      <strong>Langkah setup (lakukan sekali):</strong><br>
      1. Buka <a href="https://script.google.com" target="_blank" style="color:var(--blue)">script.google.com</a> → New Project<br>
      2. Paste kode Apps Script di bawah → Deploy sebagai Web App<br>
      3. Pilih <em>"Execute as: Me"</em> dan <em>"Anyone"</em><br>
      4. Copy URL deployment → paste di bawah
    </div>
    <details style="margin-bottom:14px">
      <summary style="cursor:pointer;font-weight:600;font-size:13px;color:var(--blue);padding:8px 0">📋 Lihat Kode Apps Script (klik untuk buka)</summary>
      <pre style="background:var(--text);color:#e8e8e8;padding:14px;border-radius:var(--radius);font-size:11px;overflow-x:auto;margin-top:8px;line-height:1.6">const SHEET_ID = 'ISI_ID_SPREADSHEET_KAMU';
const SHEET_NAME = 'Data';

function doPost(e) {
  try {
    const payload = JSON.parse(e.postData.contents);
    if (payload.action === 'save') return saveData(payload.data);
    if (payload.action === 'loadAll') return loadAll();
    return respond({status:'error',msg:'Unknown action'});
  } catch(err) {
    return respond({status:'error',msg:err.message});
  }
}

function doGet(e) { return loadAll(); }

function saveData(data) {
  const ss = SpreadsheetApp.openById(SHEET_ID);
  let sheet = ss.getSheetByName(SHEET_NAME);
  if (!sheet) sheet = ss.insertSheet(SHEET_NAME);
  const rows = sheet.getLastRow() > 0
    ? sheet.getRange(1,1,sheet.getLastRow(),1).getValues() : [];
  let found = -1;
  for (let i = 0; i &lt; rows.length; i++) {
    if (rows[i][0] === data.tanggal) { found = i+1; break; }
  }
  const row = [data.tanggal, JSON.stringify(data), new Date().toISOString()];
  if (found > 0) sheet.getRange(found,1,1,3).setValues([row]);
  else sheet.appendRow(row);
  if (sheet.getLastRow() > 1)
    sheet.getRange(1,1,sheet.getLastRow(),3).sort({column:1,ascending:false});
  return respond({status:'ok',tanggal:data.tanggal});
}

function loadAll() {
  const ss = SpreadsheetApp.openById(SHEET_ID);
  const sheet = ss.getSheetByName(SHEET_NAME);
  if (!sheet || sheet.getLastRow() === 0) return respond({status:'ok',data:[]});
  const rows = sheet.getDataRange().getValues();
  const data = rows.map(r => { try{return JSON.parse(r[1]);}catch(e){return null;} }).filter(Boolean);
  return respond({status:'ok',data});
}

function respond(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}</pre>

function simpanUrlCloud(){
  const url=(document.getElementById('cloud-url-input')?.value||'').trim();
  if(!url){toast('⚠ URL tidak boleh kosong!');return;}
  if(!url.startsWith('https://')){toast('⚠ URL harus dimulai dengan https://');return;}
  setCloudUrl(url);
  toast('✓ URL disimpan! Menguji koneksi...');
  renderDBPage(e('main-content'));
  setTimeout(testCloud,500);
}

function hapusUrlCloud(){
  if(!confirm('Putus koneksi cloud? Data lokal tetap aman.'))return;
  localStorage.removeItem(CLOUD_KEY);
  setCloudStatus('local','● LocalStorage');
  renderDBPage(e('main-content'));
  toast('Koneksi cloud diputus.');
}

async function testCloud(){
  const url=getCloudUrl();
  if(!url){toast('⚠ URL belum diatur!');return;}
  const log=e('cloud-log');
  const card=e('cloud-status-card');
  if(card)card.style.display='block';
  if(log)log.innerHTML='<span style="color:var(--amber)">↻ Menguji koneksi...</span>';
  setCloudStatus('syncing');
  try{
    const res=await fetch(url+'?action=load');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    if(json.status==='ok'){
      setCloudStatus('active','● Cloud Aktif');
      if(log)log.innerHTML=`<span style="color:var(--green)">✓ Koneksi berhasil!</span><br>
        📊 Data di cloud: <strong>${json.data.length} rekaman</strong><br>
        🕐 Diuji: ${new Date().toLocaleString('id-ID')}<br>
        ${json.data.length?'📅 Data terbaru: <strong>'+json.data[0].tanggal+'</strong>':''}`;
      toast('✓ Koneksi cloud berhasil! '+json.data.length+' rekaman ditemukan.');
    }else{
      throw new Error(json.msg||'Respons tidak valid');
    }
  }catch(err){
    setCloudStatus('error','✕ Gagal');
    if(log)log.innerHTML=`<span style="color:var(--red)">✕ Koneksi gagal: ${err.message}</span><br>
      <span style="font-size:11px;color:var(--text2)">Pastikan URL benar dan Apps Script sudah di-deploy dengan akses "Anyone".</span>`;
    toast('✕ Koneksi gagal: '+err.message);
  }
}

async function muatDariCloud(){
  if(!confirm('Muat semua data dari cloud? Data lokal akan diganti dengan data cloud.'))return;
  const r=await cloudLoad();
  if(r.ok){
    toast('✓ '+r.count+' data berhasil dimuat dari cloud!');
    renderDBPage(e('main-content'));
    // Refresh halaman aktif
    showPage(currentPage);
  }else{
    toast('✕ Gagal muat: '+r.msg);
  }
}

function exportData(){
  const json=JSON.stringify(state,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`spbu_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);
  toast('✓ Data berhasil diekspor!');
}

function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev2=>{
    try{
      const parsed=JSON.parse(ev2.target.result);
      if(!parsed.savedData)throw new Error('Format file tidak valid');
      Object.assign(state,parsed);dbSave();
      toast('✓ Data berhasil diimpor! '+state.savedData.length+' rekaman.');
      renderDBPage(e('main-content'));
    }catch(err){toast('⚠ Gagal impor: '+err.message);}
  };
  reader.readAsText(file);
}

// ─── MISC ────────────────────────────────────────────────────

// Cari stok akhir efektif dari hari sebelumnya di savedData
function getPrevDayStock(tanggalStr,b){
  if(!tanggalStr)return null;
  const tgl=new Date(tanggalStr+'T00:00:00');
  tgl.setDate(tgl.getDate()-1);
  const prevTgl=tgl.getFullYear()+'-'+String(tgl.getMonth()+1).padStart(2,'0')+'-'+String(tgl.getDate()).padStart(2,'0');
  const prevRec=state.savedData.find(d=>d.tanggal===prevTgl);
  if(!prevRec)return null;
  const lastShift=prevRec.shifts[prevRec.shifts.length-1];
  return prevRec.shiftData[lastShift]?.[b]?.stokAkhirEfektif??null;
}

// Apakah tanggal ini adalah tanggal 1 bulan?
function isTanggal1(tanggalStr){
  if(!tanggalStr)return true;
  return new Date(tanggalStr+'T00:00:00').getDate()===1;
}

function onTgl(){
  const t=e('f-tanggal')?.value;
  if(t&&e('f-hari'))e('f-hari').value=HARI[new Date(t+'T00:00:00').getDay()];
  // Re-render shifts agar stok awal otomatis diupdate saat tanggal berubah
  renderShifts();
}

function init(){
  dbLoad();
  const now=new Date();
  const tb=e('tb-date');
  if(tb)tb.textContent=now.toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  showPage('input');
  // Auto-load dari cloud saat pertama buka jika URL sudah diatur
  if(getCloudUrl()){
    setCloudStatus('loading','↻ Memuat dari cloud...');
    cloudLoad().then(r=>{
      if(r.ok){
        setCloudStatus('active','● Cloud Aktif');
        // Refresh halaman jika ada data baru
        if(currentPage==='input')renderInputPage(e('main-content'));
      }
    });
  }
}
init();
</script>
